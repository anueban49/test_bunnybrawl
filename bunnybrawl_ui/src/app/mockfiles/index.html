<!DOCTYPE html>
<html lang="en" data-theme="night">
<head>
<meta charset="UTF-8" />
<title>Bunny Brawl — Design Canvas</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  html, body, #root { margin: 0; padding: 0; height: 100%; background: var(--bg-0); }
  body { font-family: var(--font-display); color: var(--text); }

  /* Top mode switcher */
  .mode-bar {
    position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
    z-index: 9999;
    display: flex; gap: 4px;
    padding: 4px;
    background: rgba(20,20,46,.75);
    backdrop-filter: blur(14px);
    border: 1px solid var(--border);
    border-radius: 999px;
    box-shadow: 0 10px 40px rgba(0,0,0,.5), var(--glow-cyan);
  }
  [data-theme='day'] .mode-bar { background: rgba(255,255,255,.85); }
  .mode-bar button {
    background: transparent; border: none; cursor: pointer;
    color: var(--text-dim); padding: 8px 16px; border-radius: 999px;
    font-family: var(--font-display); font-size: 12px; font-weight: 600;
    display: inline-flex; align-items: center; gap: 6px;
    transition: all .15s;
  }
  .mode-bar button.active {
    background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta));
    color: #0a0a1a;
    box-shadow: 0 0 14px rgba(94,246,255,.4);
  }
  [data-theme='day'] .mode-bar button.active { color: #fff; }

  .theme-toggle {
    position: fixed; top: 14px; right: 18px; z-index: 9999;
    background: rgba(20,20,46,.75);
    backdrop-filter: blur(14px);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 4px;
    display: flex; gap: 2px;
  }
  [data-theme='day'] .theme-toggle { background: rgba(255,255,255,.85); }
  .theme-toggle button {
    background: transparent; border: none; cursor: pointer;
    color: var(--text-dim); padding: 6px 10px; border-radius: 999px;
    font-family: var(--font-display); font-size: 11px; font-weight: 600;
    display: inline-flex; align-items: center; gap: 4px;
    transition: all .15s;
  }
  .theme-toggle button.active {
    background: var(--text);
    color: var(--bg-0);
  }

  /* Proto frame sizing */
  .proto-wrap { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; }
  .proto-frame {
    width: 1440px; height: 900px;
    border-radius: 16px; overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,.5), 0 0 0 1px var(--border);
    position: relative;
    transform-origin: center;
  }

  /* Canvas frame sizing */
  .canvas-frame {
    width: 1440px; height: 900px;
    border-radius: 14px; overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,.4);
    position: relative;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="components/bunny.jsx"></script>
<script type="text/babel" src="components/primitives.jsx"></script>
<script type="text/babel" src="screens/landing.jsx"></script>
<script type="text/babel" src="screens/dashboard.jsx"></script>
<script type="text/babel" src="screens/avatar.jsx"></script>
<script type="text/babel" src="screens/quiz.jsx"></script>
<script type="text/babel" src="screens/solo.jsx"></script>
<script type="text/babel" src="screens/leaderboard.jsx"></script>
<script type="text/babel" src="screens/result.jsx"></script>
<script type="text/babel" src="screens/logbook.jsx"></script>
<script type="text/babel" src="screens/loading.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
const MOCK_USER = {
  name: 'Kai Nakamura',
  handle: '@kai_q',
  title: 'Diamond III · Scholar',
  level: 24,
  xp: 2480,
  xpMax: 3000,
  streak: 7,
  avatar: {
    hair: 'spike', hairColor: '#ffd166',
    outfit: 'hoodie', outfitColor: '#ff4fd8',
    accessory: 'glasses', effect: 'sparkle',
    skin: '#e0a888',
  },
};

function App() {
  const [mode, setMode] = React.useState(() => localStorage.getItem('bb-mode') || 'canvas');
  const [theme, setTheme] = React.useState(() => localStorage.getItem('bb-theme') || 'night');
  const [screen, setScreen] = React.useState(() => localStorage.getItem('bb-screen') || 'landing');

  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('bb-theme', theme);
  }, [theme]);
  React.useEffect(() => { localStorage.setItem('bb-mode', mode); }, [mode]);
  React.useEffect(() => { localStorage.setItem('bb-screen', screen); }, [screen]);

  // Global theme toggle hook
  React.useEffect(() => {
    const h = () => setTheme(t => t === 'night' ? 'day' : 'night');
    window.addEventListener('bb:toggle-theme', h);
    return () => window.removeEventListener('bb:toggle-theme', h);
  }, []);

  const onNav = (s) => setScreen(s);

  const screens = {
    landing:      <LandingHero onNav={onNav} />,
    'landing-b':  <LandingArcade onNav={onNav} />,
    'landing-c':  <LandingVersus onNav={onNav} />,
    dashboard:    <DashboardCommand onNav={onNav} user={MOCK_USER} />,
    'dash-b':     <DashboardShelf onNav={onNav} user={MOCK_USER} />,
    avatar:       <AvatarCustomize onNav={onNav} />,
    quiz:         <QuizBattle onNav={onNav} />,
    solo:         <SoloPlay onNav={onNav} />,
    leaderboard:  <Leaderboard onNav={onNav} />,
    result:       <ResultScreen onNav={onNav} outcome="win" />,
    'result-loss':<ResultScreen onNav={onNav} outcome="loss" />,
    logbook:      <Logbook onNav={onNav} />,
    loading:      <LoadingScreen onNav={onNav} state="running" />,
  };

  // Prototype mode — full-bleed, scaled to viewport
  const protoRef = React.useRef(null);
  const [scale, setScale] = React.useState(1);
  React.useEffect(() => {
    if (mode !== 'proto') return;
    const fit = () => {
      const w = window.innerWidth, h = window.innerHeight;
      const s = Math.min(w / 1440, (h - 20) / 900, 1);
      setScale(s);
    };
    fit();
    window.addEventListener('resize', fit);
    return () => window.removeEventListener('resize', fit);
  }, [mode]);

  return (
    <>
      <div className="mode-bar">
        <button className={mode === 'canvas' ? 'active' : ''} onClick={() => setMode('canvas')}>
          <Icon name="plus" size={12}/> Design Canvas
        </button>
        <button className={mode === 'proto' ? 'active' : ''} onClick={() => setMode('proto')}>
          <Icon name="play" size={12}/> Clickable Prototype
        </button>
      </div>

      <div className="theme-toggle">
        <button className={theme === 'night' ? 'active' : ''} onClick={() => setTheme('night')}>
          <Icon name="moon" size={12}/> Night
        </button>
        <button className={theme === 'day' ? 'active' : ''} onClick={() => setTheme('day')}>
          <Icon name="sun" size={12}/> Day
        </button>
      </div>

      {mode === 'proto' ? (
        <div className="proto-wrap">
          <div className="proto-frame" ref={protoRef}
               style={{ transform: `scale(${scale})` }}
               data-screen-label={screen}>
            {screens[screen] || screens.landing}
          </div>
        </div>
      ) : (
        <DesignCanvas>
          <DCSection id="landing" title="Landing Page" subtitle="3 variations of the hero">
            <DCArtboard id="la" label="A · Hero Center" width={1440} height={900}>
              <div className="canvas-frame" data-screen-label="01 Landing A"><LandingHero onNav={() => {}}/></div>
            </DCArtboard>
            <DCArtboard id="lb" label="B · Arcade Cabinet" width={1440} height={900}>
              <div className="canvas-frame" data-screen-label="02 Landing B"><LandingArcade onNav={() => {}}/></div>
            </DCArtboard>
            <DCArtboard id="lc" label="C · 1v1 Split" width={1440} height={900}>
              <div className="canvas-frame" data-screen-label="03 Landing C"><LandingVersus onNav={() => {}}/></div>
            </DCArtboard>
          </DCSection>

          <DCSection id="dashboard" title="Player Dashboard" subtitle="2 layouts">
            <DCArtboard id="da" label="A · Command Deck" width={1440} height={900}>
              <div className="canvas-frame" data-screen-label="04 Dash A"><DashboardCommand onNav={() => {}} user={MOCK_USER}/></div>
            </DCArtboard>
            <DCArtboard id="db" label="B · Trophy Shelf" width={1440} height={900}>
              <div className="canvas-frame" data-screen-label="05 Dash B"><DashboardShelf onNav={() => {}} user={MOCK_USER}/></div>
            </DCArtboard>
          </DCSection>

          <DCSection id="core-loop" title="Core Play Loop" subtitle="Customize · Battle · Solo · Result">
            <DCArtboard id="av" label="Avatar Customization" width={1440} height={900}>
              <div className="canvas-frame" data-screen-label="06 Avatar"><AvatarCustomize onNav={() => {}}/></div>
            </DCArtboard>
            <DCArtboard id="qz" label="Quiz Battle · Live" width={1440} height={900}>
              <div className="canvas-frame" data-screen-label="07 Quiz"><QuizBattle onNav={() => {}}/></div>
            </DCArtboard>
            <DCArtboard id="so" label="Solo Play · Source" width={1440} height={900}>
              <div className="canvas-frame" data-screen-label="08 Solo"><SoloPlay onNav={() => {}}/></div>
            </DCArtboard>
            <DCArtboard id="rs" label="Result · Victory" width={1440} height={900}>
              <div className="canvas-frame" data-screen-label="09 Result"><ResultScreen onNav={() => {}} outcome="win"/></div>
            </DCArtboard>
          </DCSection>

          <DCSection id="meta" title="Meta & Utility" subtitle="Leaderboard · Logbook · Loading">
            <DCArtboard id="lb2" label="Leaderboard" width={1440} height={900}>
              <div className="canvas-frame" data-screen-label="10 Leaderboard"><Leaderboard onNav={() => {}}/></div>
            </DCArtboard>
            <DCArtboard id="lg" label="Logbook · Journal" width={1440} height={900}>
              <div className="canvas-frame" data-screen-label="11 Logbook"><Logbook onNav={() => {}}/></div>
            </DCArtboard>
            <DCArtboard id="ld" label="Loading · Bunny Rush" width={1440} height={900}>
              <div className="canvas-frame" data-screen-label="12 Loading"><LoadingScreen onNav={() => {}} state="running"/></div>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      )}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
